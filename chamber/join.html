    <main>
        <h1>Join Chamber</h1>

    <form method="GET" action="thankyou.html" class="designOne">
      <label>First Name <input type="text" name="first" required autocomplete="given-name" title="Your First Name"></label>
        <label>Last Name <input type="text" name="last" required autocomplete="family-name" title="Your Last Name"></label>
         <label>Organization Title<input type="text" name="organization-title" required autocomplete="organization-title" title="Your Organization-title"></label>
        
         <label>Email <input type="email" name="email" required placeholder="john89@gmail.com"  title="Your Email" autocomplete="email"></label>
         <label>Cell Phone <input type="tel" name="phone"  autocomplete="tel" title="A Phone Number with dashes" placeholder="987-555-1234" required ></label>
         <label>Business/Organization Name<input type="text" name="business-name" autocomplete="organization" title="organization" required></label>
        <h3>Select Ordinance</h3>
        <label><input type="radio" name="membership-level" value="gold" >Gold</label>
        <label><input type="radio" name="membership-level" value="silver"> Silver</label>
        <label><input type="radio" name="membership-level" value="bronze">Bronze</label>
        <label><input type="radio" name="membership-level" value="np">Bronze</label>

        <label><input type="textarea" placeholder="Description of business" title="description of business" > </label>
        
        <h3>Date and Location</h3>
        <label>Date <input type="date" name="date" required></label>

        <label>Location
          <select name="location" required>
            <option value="">None</option>
            <option value="Payson">Payson</option>
            <option value="Orem">Orem</option>
            <option value="Provo City Center">Provo City Center</option>
        </label>

        <input type="submit" value="Schedule An Appointment">
    </form>
